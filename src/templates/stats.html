<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Math Collection — Stats</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script defer src="{{ url_for('static', filename='js/stats.js') }}"></script>
</head>
<body>
  <div class="user-bar">
    {% if current_user %}
      <span class="user-info">
        {% if current_user.picture %}<img src="{{ current_user.picture }}" alt="" class="user-avatar">{% endif %}
        Signed in as <strong>{{ current_user.email }}</strong>
      </span>
      <a href="{{ url_for('auth.logout') }}" class="user-action">Sign out</a>
    {% endif %}
  </div>
  <h1>Stats</h1>
  <p class="sub"><a href="{{ url_for('pages.index') }}">← Back to collection</a></p>

  <section class="chart-section">
    <h2>Problems by category</h2>
    <p class="chart-hint">Click a bar to see the difficulty breakdown for that category.</p>
    <div id="chart-categories" class="bar-chart" aria-label="Problems by category"></div>
  </section>

  <section class="chart-section">
    <h2 id="difficulty-title">Difficulty distribution</h2>
    <div id="chart-difficulty" class="bar-chart" aria-label="Difficulty distribution"></div>
  </section>
</body>
</html>
