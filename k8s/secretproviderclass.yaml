apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: webapp-secrets
  namespace: __NAMESPACE__
spec:
  # `gke` provider is installed by the GKE Secret Manager add-on
  # (--enable-secret-manager on the cluster). It uses Workload Identity
  # under the hood, so the pod's KSA must map to a GSA with
  # roles/secretmanager.secretAccessor on each referenced secret.
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/__PROJECT_ID__/secrets/__SECRET_PREFIX__GOOGLE_CLIENT_ID/versions/latest"
        path: "GOOGLE_CLIENT_ID"
      - resourceName: "projects/__PROJECT_ID__/secrets/__SECRET_PREFIX__GOOGLE_CLIENT_SECRET/versions/latest"
        path: "GOOGLE_CLIENT_SECRET"
      - resourceName: "projects/__PROJECT_ID__/secrets/__SECRET_PREFIX__ANTHROPIC_API_KEY/versions/latest"
        path: "ANTHROPIC_API_KEY"
  # Mirror the mounted files into a k8s Secret so the app can consume them
  # as env vars (envFrom) without changing application code. The Secret is
  # only (re)created when a pod actually mounts the CSI volume.
  secretObjects:
    - secretName: webapp-secrets
      type: Opaque
      data:
        - objectName: GOOGLE_CLIENT_ID
          key: GOOGLE_CLIENT_ID
        - objectName: GOOGLE_CLIENT_SECRET
          key: GOOGLE_CLIENT_SECRET
        - objectName: ANTHROPIC_API_KEY
          key: ANTHROPIC_API_KEY
