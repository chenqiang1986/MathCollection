apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: __NAMESPACE__
spec:
  # Tells ESO how to reach the backend. No auth block is set, so ESO falls
  # back to Application Default Credentials from the pod it runs in. That
  # pod is annotated with the ESO GSA (see deploy_gke.sh), and the GSA has
  # roles/secretmanager.secretAccessor on the three secrets below.
  provider:
    gcpsm:
      projectID: __PROJECT_ID__
