apiVersion: apps/v1
kind: Deployment
metadata:
  name: math-mistake-tracker
  namespace: __NAMESPACE__
  labels:
    app: math-mistake-tracker
spec:
  replicas: 1
  # Per-user SQLite files on a GCS Fuse mount can't tolerate two pods writing
  # at once, so never run old+new together during a rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: math-mistake-tracker
  template:
    metadata:
      labels:
        app: math-mistake-tracker
      annotations:
        # Tells GKE to inject the gcsfuse sidecar into this pod.
        gke-gcsfuse/volumes: "true"
    spec:
      serviceAccountName: __KSA_NAME__
      containers:
        - name: webapp
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          # GCP_PROJECT_ID tells webapp/entrypoint.sh to hydrate secrets from
          # Secret Manager (auth via Workload Identity on the pod's KSA).
          env:
            - name: GCP_PROJECT_ID
              value: __PROJECT_ID__
            - name: SECRET_PREFIX
              value: __SECRET_PREFIX__
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data-vol
              mountPath: /app/data
      volumes:
        - name: data-vol
          csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              bucketName: __BUCKET__
              mountOptions: "implicit-dirs"
