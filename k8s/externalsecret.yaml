apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: webapp-secrets
  namespace: __NAMESPACE__
spec:
  # ESO re-reads from Secret Manager on this interval and patches the k8s
  # Secret if values changed. Pods still need a restart to pick up new env
  # vars (install stakater/Reloader if you want that automatic).
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    # The k8s Secret that ESO will create/own. `envFrom` in the Deployment
    # references this name.
    name: webapp-secrets
    creationPolicy: Owner
  data:
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: __SECRET_PREFIX__GOOGLE_CLIENT_ID
        version: latest
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: __SECRET_PREFIX__GOOGLE_CLIENT_SECRET
        version: latest
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: __SECRET_PREFIX__ANTHROPIC_API_KEY
        version: latest
