apiVersion: v1
kind: ServiceAccount
metadata:
  name: __KSA_NAME__
  namespace: __NAMESPACE__
  annotations:
    # Workload Identity: pods using this KSA impersonate this GCP SA when
    # calling Google APIs (Secret Manager, GCS). Bound by deploy_gke.sh.
    iam.gke.io/gcp-service-account: __GSA_EMAIL__
